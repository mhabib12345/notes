baseURL = "mhabib12345.github.io/notes"
languageCode = 'en-us'
title = 'just a note'
theme = 'syracuse'

[params]
math = true  # Enable MathJax globally

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]


[[menus.main]]
name = 'home'
pageRef = '/'
weight = 10

[[menus.main]]
name = 'blog'
pageRef = '/blog'
weight = 20

[[menus.main]]
name = 'linux'
pageRef = '/linux'
weight = 30

[[menus.main]]
name = 'math'
pageRef = '/math'
weight = 40

[module]
  [[module.mounts]]
    source = "docs"
    target = "static/docs"
